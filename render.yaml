services:

type: web
name: terrainvente
env: docker
plan: free

Commande pour migrer la DB et lancer le serveur Apache

dockerCommand: "php artisan migrate --force && apache2-foreground"

envVars:

key: APP_NAME
value: TerrainVente

key: APP_ENV
value: production

key: APP_KEY
generateValue: true

key: APP_DEBUG
value: false

key: LOG_CHANNEL
value: stderr

key: DB_CONNECTION
value: pgsql

key: DB_HOST
fromDatabase:
name: terrainvente-db
property: host

key: DB_PORT
fromDatabase:
name: terrainvente-db
property: port

key: DB_DATABASE
fromDatabase:
name: terrainvente-db
property: database

key: DB_USERNAME
fromDatabase:
name: terrainvente-db
property: user

key: DB_PASSWORD
fromDatabase:
name: terrainvente-db
property: password

databases:

name: terrainvente-db
databaseName: terrainvente
user: terrain_user
plan: free